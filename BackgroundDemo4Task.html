<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style> 
     div{
        height: 300px;
        width: 300px;
     }

     .div1{
        background-color: aqua;
     }
     .div2{
        background-image: url("sachin.avif");
     }
     .div3{
        height: 500px;
        width: 500px;
        background-image: url("sachin.avif");
        background-color: beige;
        background-repeat: no-repeat;
    }
    .div4{
        background-image: url("sachin.avif");
        background-repeat: no-repeat;
        background-color: antiquewhite;
        background-size: cover;
        background-position: center;
    }
    </style>
</head>
<body>
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
    <div class="div4"></div>
</body>
</html>
