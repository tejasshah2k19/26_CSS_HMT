<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    /* selector */


    /* tag */
    h1{
        color: yellow;
    }

    /* class */
    .h1{
        color: red;
    }

    /* id */
    #h1{
        color: greenyellow;
    }
 

    body{
        border: none;
    }

    html{
        border: none;
    }

    *{
        border: dotted;
    }


</style>

</head>
<body>

    <h1>
        Royal Education 
    </h1>

    <h1 class="h1">
        HMT
    </h1>

    <h1 id="h1">
        CSS Batch
    </h1>
    
</body>
</html>
