<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
<style>
    body {
    background-color: #2bb39a;
    font-family: Arial;
}

/* Center box */
.container {
    width: 400px;
    margin: 100px auto;
    background-color: white;
}

/* Header */
.header {
    background-color: #1f9d85;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Form area */
.form-box {
    padding: 20px;
}

/* Inputs */
input {
    width: 80%;
    padding: 10px;
    margin-bottom: 10px;
    
}

/* Forgot password */
.forgot {
    color: #1f9d85;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background-color: #1f9d85;
    color: white;
    border: none;
    margin-top: 10px;
}

/* Signup text */
.signup {
    text-align: center;
    margin-top: 10px;
}

.signup span {
    color: #1f9d85;
}
</style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <h2>Login Form</h2>
    </div>

    <div class="form-box">
        <input type="text" placeholder="Email or Phone">
        <input type="password" placeholder="Password">

        <p class="forgot">Forgot password?</p>

        <button>Login</button>

        <p class="signup">
            Not a member? <span>Signup now</span>
        </p>
    </div>

</div>

</body>
</html>
