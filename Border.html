<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .border1 {
            border-style: solid;
            border-width: 3px;
        }


        .border2 {
            border-style: solid;
            border-width: 10px;
        }

        .border3 {
            border-style: double;
            border-width: 3px;
            border-color: red;
            border-radius: 10px;
        }

        .border4 {
            border-style: dashed;
            border-bottom-style: dotted;
            border-left-style: solid;
            border-right-style: double;
        }

        .border5{
            border:solid 3px red;
        }
</style>

</head>

<body>

    <p class="border1">
        This is an example of border 1
    </p>


    <p class="border2">
        This is an example of border 2
    </p>


    <p class="border3">
        This is an example of border 3
    </p>

    <p class="border4">
        this is an example of border 4
    </p>

    <p class="border5">
        this is an example of border 5
    </p>

</body>

</html>
